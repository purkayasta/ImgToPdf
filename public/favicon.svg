<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background (subtle) -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdf4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ecfdf5;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="emeraldGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Soft gradient background -->
  <rect width="128" height="128" fill="url(#bgGradient)"/>

  <!-- Subtle glow background -->
  <circle cx="64" cy="64" r="56" fill="none" stroke="#10b981" stroke-width="0.5" opacity="0.1"/>

  <!-- Document/PDF icon in refined emerald green -->
  <g filter="url(#glow)">
    <!-- Document page -->
    <rect x="32" y="28" width="52" height="72" rx="3" fill="none" stroke="url(#emeraldGreen)" stroke-width="3.5"/>

    <!-- Fold corner -->
    <path d="M 84 28 L 84 44 L 100 44" fill="none" stroke="url(#emeraldGreen)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Document lines -->
    <line x1="42" y1="48" x2="76" y2="48" stroke="url(#emeraldGreen)" stroke-width="3" stroke-linecap="round"/>
    <line x1="42" y1="60" x2="76" y2="60" stroke="url(#emeraldGreen)" stroke-width="3" stroke-linecap="round"/>
    <line x1="42" y1="72" x2="76" y2="72" stroke="url(#emeraldGreen)" stroke-width="3" stroke-linecap="round"/>

    <!-- Plus badge -->
    <g transform="translate(92, 82)">
      <circle cx="0" cy="0" r="14" fill="#f0fdf4" stroke="url(#emeraldGreen)" stroke-width="3"/>
      <line x1="0" y1="-7" x2="0" y2="7" stroke="url(#emeraldGreen)" stroke-width="3" stroke-linecap="round"/>
      <line x1="-7" y1="0" x2="7" y2="0" stroke="url(#emeraldGreen)" stroke-width="3" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Subtle accent dots -->
  <circle cx="20" cy="110" r="6" fill="none" stroke="url(#emeraldGreen)" stroke-width="1" opacity="0.25"/>
  <circle cx="108" cy="18" r="5" fill="none" stroke="url(#emeraldGreen)" stroke-width="1" opacity="0.2"/>
</svg>